name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

# CI's only job is quality gating — lint + version-consistency. Distribution
# is self-hosted (zips + manifests served from dev.estatesite.eu/updates/).
# Releases are cut manually on the dev server via bin/release.sh.

jobs:
  lint:
    name: PHP syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 7.4 (lowest supported)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: none

      - name: php -l all PHP files (skip vendored libraries)
        shell: bash
        run: |
          # Vendored libraries we don't lint: CodeStar, Meta Box.
          # Their internal style varies and we treat them as black-box deps.
          find . -name '*.php' \
            -not -path './codestar-framework/*' \
            -not -path './lib/meta-box/*' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -print0 \
          | xargs -0 -n1 -P4 php -l \
          | grep -v "^No syntax errors" \
          | tee lint_errors.txt
          if [ -s lint_errors.txt ]; then
            echo "::error::PHP syntax errors found"
            exit 1
          fi

  version-consistency:
    name: Version consistency
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: "Compare plugin Version: vs tag"
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_VERSION=$(grep -m1 '^[[:space:]]*\*[[:space:]]*Version:' estatesite-wpelementor.php | sed -E 's/.*Version:[[:space:]]+//' | xargs)
          echo "Tag: $TAG_VERSION"
          echo "Plugin header: $PLUGIN_VERSION"
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION but plugin header Version: $PLUGIN_VERSION — bump the plugin header before tagging"
            exit 1
          fi
